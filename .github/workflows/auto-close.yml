name: Close completed issues

on:
  issues:
    types: [opened, labeled]

jobs:
  close-completed:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close issue if labeled as completed
        if: contains(github.event.issue.labels.*.name, 'completed')
        run: |
          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }} --comment "Automatically closing issue with 'completed' label."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}